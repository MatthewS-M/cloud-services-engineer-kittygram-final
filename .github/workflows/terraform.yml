name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: Select the Terraform action
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra
    env:
      TF_VAR_cloud_id: ${{ secrets.YC_CLOUD_ID }}
      TF_VAR_folder_id: ${{ secrets.YC_FOLDER_ID }}
      TF_VAR_zone: ${{ secrets.YC_ZONE }}
      TF_VAR_vm_user: ${{ secrets.USER }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_service_account_key_file: ${{ github.workspace }}/infra/sa-key.json
      TF_VAR_storage_access_key: ${{ secrets.STORAGE_ACCESS_KEY }}
      TF_VAR_storage_secret_key: ${{ secrets.STORAGE_SECRET_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Prepare service account key
        run: printf '%s' '${{ secrets.YC_SERVICE_ACCOUNT_KEY_JSON }}' > sa-key.json

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="access_key=${{ secrets.STORAGE_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.STORAGE_SECRET_KEY }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        if: ${{ github.event.inputs.action == 'plan' }}
        run: terraform plan -input=false -out=tfplan

      - name: Terraform apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -input=false -auto-approve

      - name: Terraform destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -input=false -auto-approve
